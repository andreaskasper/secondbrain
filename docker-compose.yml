services:
  secondbrain:
    build: .
    # Or use a prebuilt image instead of build:
    # image: ghcr.io/andreaskasper/secondbrain:latest
    container_name: secondbrain
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # The shared secret required on every request (X-API-Key or Bearer).
      # Override this in a .env file or your secrets manager — do NOT ship this default.
      SECONDBRAIN_API_KEY: "change-me-please"
      SECONDBRAIN_DATA_DIR: "/data"
      SECONDBRAIN_ADDR: ":8080"
      # Optional: max request body size in bytes (default 10 MiB).
      # SECONDBRAIN_MAX_BODY_BYTES: "10485760"
    volumes:
      # Persistent storage for the markdown tree.
      - secondbrain-data:/data
      # Alternatively, bind-mount a host directory so you can edit with git/an editor:
      # - ./brain:/data

volumes:
  secondbrain-data:
